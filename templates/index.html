<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Krushi Mitra</title>
    <script>
        function startDictation() {
            if (window.SpeechRecognition || window.webkitSpeechRecognition) {
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'en-IN'; // Change to 'mr-IN' for Marathi
                recognition.interimResults = false;
                recognition.onresult = function(event) {
                    document.getElementById('textInput').value = event.results[0][0].transcript;
                }
                recognition.start();
            } else {
                alert('Your browser does not support the Web Speech API. Please try in a different browser.');
            }
        }

        function submitInput() {
            const inputText = document.getElementById('textInput').value;
            const resultArea = document.getElementById('result');
            resultArea.textContent = "You submitted: " + inputText;
            speakResult(inputText);
        }

        function speakResult(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
    </script>
</head>
<body>
    <h1>Smart Krushi Mitra</h1>
    <div>
        <input type="text" id="textInput" placeholder="Type here or use the microphone...">
        <button onclick="startDictation()">🎤</button>
        <button onclick="submitInput()">Submit</button>
    </div>
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
</body>
</html>
